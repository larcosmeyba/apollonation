name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build signed iOS IPA
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUNDLE_ID: com.apollonation.app
      IOS_SCHEME: App
      IOS_PROJECT_DIR: ios/App
      IOS_PROJECT: ios/App/App.xcodeproj
      IOS_WORKSPACE: ios/App/App.xcworkspace
      ARCHIVE_PATH: ios/App/build/App.xcarchive
      EXPORT_PATH: ios/App/build/export
      EXPORT_OPTIONS_PLIST: ios/App/ExportOptions.plist
      PROVISIONING_PROFILE_NAME: Apollo Nation App Store
      EXPECTED_TEAM_ID: 4APZGH6X99
      VERSION_NAME: "1.6.4"
      VERSION_CODE: "44"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Show runner diagnostics
        run: |
          set -euxo pipefail
          sw_vers
          xcode-select -p
          xcodebuild -version
          pod --version

      - name: Validate required GitHub secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_PROVISIONING_PROFILE APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done
          if [ "$APPLE_TEAM_ID" != "$EXPECTED_TEAM_ID" ]; then
            echo "APPLE_TEAM_ID does not match expected $EXPECTED_TEAM_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Ensure Capacitor CLI exists
        run: |
          set -euxo pipefail
          if [ ! -x ./node_modules/.bin/cap ]; then
            npm install --no-save @capacitor/cli @capacitor/core @capacitor/ios @capacitor/android
          fi
          ./node_modules/.bin/cap --version

      - name: Build web app
        run: npm run build

      - name: Regenerate iOS as CocoaPods project
        run: |
          set -euxo pipefail
          rm -rf ios
          CAPACITOR_IOS_USE_SPM=false ./node_modules/.bin/cap add ios --packagemanager cocoapods || CAPACITOR_IOS_USE_SPM=false ./node_modules/.bin/cap add ios
          if [ ! -f "$IOS_PROJECT_DIR/Podfile" ]; then
            echo "::error::Podfile was not generated — Capacitor still used SPM."
            ls -la ios/App
            exit 1
          fi
          rm -rf ios/App/CapApp-SPM

      - name: Generate Apollo app icons (iOS)
        run: |
          set -euxo pipefail
          if [ ! -f resources/icon.png ]; then
            echo "::error::resources/icon.png missing — Apollo app icon source not found."
            exit 1
          fi
          npm install --no-save @capacitor/assets
          npx @capacitor/assets generate \
            --ios \
            --iconBackgroundColor '#000000' \
            --iconBackgroundColorDark '#000000'
          ls ios/App/App/Assets.xcassets/AppIcon.appiconset | head

      - name: Inspect provisioning profile capabilities
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile-inspect.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile-inspect.plist"

          python3 - "$PROFILE_PATH" <<'PY'
          import base64, os, re, sys
          raw = os.environ.get("APPLE_PROVISIONING_PROFILE", "")
          stripped = re.sub(r"-----[A-Z ]+-----", "", raw)
          cleaned = re.sub(r"[^A-Za-z0-9+/=_-]", "", stripped).replace("-", "+").replace("_", "/")
          cleaned += "=" * ((-len(cleaned)) % 4)
          open(sys.argv[1], "wb").write(base64.b64decode(cleaned, validate=False))
          PY
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          if /usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" "$PROFILE_PLIST" >/dev/null 2>&1; then
            echo "PROFILE_HAS_PUSH=true" >> "$GITHUB_ENV"
          else
            echo "PROFILE_HAS_PUSH=false" >> "$GITHUB_ENV"
            echo "::warning::Provisioning profile does not include Push Notifications. CI will omit the aps entitlement so the archive can still sign. Enable Push Notifications on the App ID and regenerate the profile when you want native push enabled."
          fi

          if /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.healthkit" "$PROFILE_PLIST" >/dev/null 2>&1; then
            echo "PROFILE_HAS_HEALTHKIT=true" >> "$GITHUB_ENV"
          else
            echo "PROFILE_HAS_HEALTHKIT=false" >> "$GITHUB_ENV"
            echo "::warning::Provisioning profile does not include HealthKit. CI will omit the HealthKit entitlement so the archive can still sign. Enable HealthKit on the App ID and regenerate the profile when Apple Health sync is required."
          fi

      - name: Patch Info.plist with HealthKit + push background mode
        run: |
          set -euxo pipefail
          INFO=ios/App/App/Info.plist

          plutil -remove NSHealthShareUsageDescription "$INFO" 2>/dev/null || true
          plutil -remove NSHealthUpdateUsageDescription "$INFO" 2>/dev/null || true
          plutil -insert NSHealthShareUsageDescription -string "Apollo Reborn reads your steps, workouts, heart rate, active calories, sleep, and weight from Apple Health so your coach can personalize training and you can track progress in one place." "$INFO"
          plutil -insert NSHealthUpdateUsageDescription -string "Apollo Reborn may write workout sessions back to Apple Health so all your fitness data lives together." "$INFO"

          plutil -remove NSCameraUsageDescription "$INFO" 2>/dev/null || true
          plutil -remove NSPhotoLibraryUsageDescription "$INFO" 2>/dev/null || true
          plutil -remove NSPhotoLibraryAddUsageDescription "$INFO" 2>/dev/null || true
          plutil -insert NSCameraUsageDescription -string "Apollo Reborn uses the camera to capture meal photos and progress photos. Photos are uploaded only to your private account." "$INFO"
          plutil -insert NSPhotoLibraryUsageDescription -string "Apollo Reborn lets you choose meal and progress photos from your library." "$INFO"
          plutil -insert NSPhotoLibraryAddUsageDescription -string "Apollo Reborn saves workout cards and progress photos to your photo library when you tap Save." "$INFO"

          plutil -remove ITSAppUsesNonExemptEncryption "$INFO" 2>/dev/null || true
          plutil -insert ITSAppUsesNonExemptEncryption -bool false "$INFO"

          plutil -remove UIBackgroundModes "$INFO" 2>/dev/null || true
          if [ "${PROFILE_HAS_PUSH:-false}" = "true" ]; then
            plutil -insert UIBackgroundModes -json '["remote-notification"]' "$INFO"
          fi

          plutil -remove CFBundleShortVersionString "$INFO" 2>/dev/null || true
          plutil -insert CFBundleShortVersionString -string "$VERSION_NAME" "$INFO"
          plutil -remove CFBundleVersion "$INFO" 2>/dev/null || true
          plutil -insert CFBundleVersion -string "$VERSION_CODE" "$INFO"

          plutil -lint "$INFO"
          plutil -p "$INFO" | head -60

      - name: Create App.entitlements with HealthKit capability
        run: |
          set -euxo pipefail
          ENT=ios/App/App/App.entitlements
          python3 <<'PY'
          import os, plistlib
          entitlements = {}
          if os.environ.get("PROFILE_HAS_HEALTHKIT") == "true":
              entitlements["com.apple.developer.healthkit"] = True
          if os.environ.get("PROFILE_HAS_PUSH") == "true":
              entitlements["aps-environment"] = "production"
          with open("ios/App/App/App.entitlements", "wb") as f:
              plistlib.dump(entitlements, f, sort_keys=True)
          PY
          plutil -lint "$ENT"

      - name: Wire entitlements into project.pbxproj
        run: |
          set -euxo pipefail
          PBX=ios/App/App.xcodeproj/project.pbxproj
          if ! grep -q "CODE_SIGN_ENTITLEMENTS" "$PBX"; then
            python3 <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/App.xcodeproj/project.pbxproj")
          src = p.read_text()
          patched = re.sub(
              r"(PRODUCT_BUNDLE_IDENTIFIER = com\.apollonation\.app;)",
              r"\1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;",
              src,
          )
          p.write_text(patched)
          print("Patched project.pbxproj with CODE_SIGN_ENTITLEMENTS")
          PY
          fi
          grep -c "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" "$PBX" || (echo "Failed to patch entitlements path" && exit 1)

      - name: Sync Capacitor (registers all native plugins)
        run: |
          set -euxo pipefail
          ./node_modules/.bin/cap sync ios

      - name: Install Pods
        working-directory: ios/App
        run: |
          set -euxo pipefail
          pod install --repo-update
          ls -la

      - name: Patch Xcode signing for CI archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          python3 <<'PY'
          import os, pathlib, re

          bundle_id = os.environ["BUNDLE_ID"]
          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["PROVISIONING_PROFILE_NAME"]
          has_push = os.environ.get("PROFILE_HAS_PUSH") == "true"
          has_healthkit = os.environ.get("PROFILE_HAS_HEALTHKIT") == "true"

          app_pbx = pathlib.Path("ios/App/App.xcodeproj/project.pbxproj")
          src = app_pbx.read_text()

          settings = {
              "CODE_SIGN_STYLE": "Manual",
              "DEVELOPMENT_TEAM": team_id,
              "CODE_SIGN_IDENTITY": '"Apple Distribution"',
              "CODE_SIGN_ENTITLEMENTS": "App/App.entitlements",
              "PROVISIONING_PROFILE_SPECIFIER": f'"{profile_name}"',
          }

          # Split into lines and find each line containing the App bundle id.
          # For each such line, walk backwards to find the enclosing buildSettings = { ... };
          # block, then upsert each required key inside that block.
          lines = src.split("\n")
          # Find indices of bundle-id lines (App target only)
          bundle_re = re.compile(rf"PRODUCT_BUNDLE_IDENTIFIER\s*=\s*{re.escape(bundle_id)}\s*;")
          bundle_idxs = [i for i, ln in enumerate(lines) if bundle_re.search(ln)]
          if not bundle_idxs:
              raise SystemExit(f"Could not find PRODUCT_BUNDLE_IDENTIFIER = {bundle_id}; in pbxproj")

          # Process from bottom to top so insertions don't shift earlier indices
          for bi in sorted(bundle_idxs, reverse=True):
              # Find start of buildSettings block (line with "buildSettings = {")
              start = bi
              while start >= 0 and "buildSettings = {" not in lines[start]:
                  start -= 1
              if start < 0:
                  continue
              # Find end of block: matching "};" with same indentation as the opening line's indent
              indent_match = re.match(r"(\s*)", lines[start])
              indent = indent_match.group(1) if indent_match else ""
              end = start + 1
              depth = 1
              while end < len(lines) and depth > 0:
                  if "{" in lines[end]:
                      depth += lines[end].count("{")
                  if "}" in lines[end]:
                      depth -= lines[end].count("}")
                  if depth == 0:
                      break
                  end += 1
              # Inner indent for settings (one level deeper than buildSettings line)
              inner_indent = indent + "\t"
              # Upsert each key
              for key, value in settings.items():
                  key_re = re.compile(rf"^\s*{re.escape(key)}\s*=\s*[^;]*;\s*$")
                  found = False
                  for j in range(start + 1, end):
                      if key_re.match(lines[j]):
                          lines[j] = f"{inner_indent}{key} = {value};"
                          found = True
                          break
                  if not found:
                      lines.insert(end, f"{inner_indent}{key} = {value};")
                      end += 1

          src = "\n".join(lines)

          # Flip ProvisioningStyle to Manual everywhere in the App project
          src = src.replace("ProvisioningStyle = Automatic;", "ProvisioningStyle = Manual;")

          app_pbx.write_text(src)

          # Pods: strip any provisioning profile specifiers, force Automatic style
          pods_pbx = pathlib.Path("ios/App/Pods/Pods.xcodeproj/project.pbxproj")
          if pods_pbx.exists():
              pods = pods_pbx.read_text()
              pods = re.sub(r"\n\s*PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;", "", pods)
              pods = re.sub(r"\n\s*PROVISIONING_PROFILE\s*=\s*[^;]*;", "", pods)
              pods = pods.replace("CODE_SIGN_STYLE = Manual;", "CODE_SIGN_STYLE = Automatic;")
              pods_pbx.write_text(pods)

          print("Patched App target for manual signing and cleared Pods provisioning profiles.")
          PY
          grep -q "PROVISIONING_PROFILE_SPECIFIER = \"$PROVISIONING_PROFILE_NAME\";" ios/App/App.xcodeproj/project.pbxproj
          if [ -f ios/App/Pods/Pods.xcodeproj/project.pbxproj ]; then
            ! grep -q "PROVISIONING_PROFILE_SPECIFIER = $PROVISIONING_PROFILE_NAME" ios/App/Pods/Pods.xcodeproj/project.pbxproj
          fi

      - name: Verify HealthKit pod was installed
        run: |
          set -euxo pipefail
          if ! grep -qi "CapacitorHealth" ios/App/Podfile.lock; then
            echo "::error::capacitor-health pod did NOT install. Check ios/App/Podfile."
            cat ios/App/Podfile
            cat ios/App/Podfile.lock | head -40
            exit 1
          fi
          echo "HealthKit pod installed correctly."

      - name: Install signing assets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euxo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="temp123"

          decode_secret() {
            local var_name="$1"
            local out_path="$2"
            local label="$3"
            python3 - "$var_name" "$out_path" "$label" <<'PY'
          import base64, os, re, sys
          var_name, out_path, label = sys.argv[1], sys.argv[2], sys.argv[3]
          raw = os.environ.get(var_name, "")
          if not raw:
              print(f"::error::{label} secret ({var_name}) is empty.", file=sys.stderr); sys.exit(1)
          stripped = re.sub(r"-----[A-Z ]+-----", "", raw)
          cleaned = re.sub(r"[^A-Za-z0-9+/=_-]", "", stripped).replace("-", "+").replace("_", "/")
          cleaned += "=" * ((-len(cleaned)) % 4)
          data = base64.b64decode(cleaned, validate=False)
          if len(data) < 100:
              print(f"::error::{label} decoded to only {len(data)} bytes.", file=sys.stderr); sys.exit(1)
          open(out_path, "wb").write(data)
          print(f"{label}: decoded {len(data)} bytes -> {out_path}")
          PY
          }

          decode_secret APPLE_CERTIFICATE "$CERT_PATH" "APPLE_CERTIFICATE"
          decode_secret APPLE_PROVISIONING_PROFILE "$PROFILE_PATH" "APPLE_PROVISIONING_PROFILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_APPID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")

          EXPECTED_APPID="${PROFILE_TEAM}.${BUNDLE_ID}"
          if [ "$PROFILE_APPID" != "$EXPECTED_APPID" ]; then
            echo "::error::Provisioning profile is for '$PROFILE_APPID' but the app bundle ID is '$EXPECTED_APPID'."
            exit 1
          fi
          if [ "$PROFILE_NAME" != "$PROVISIONING_PROFILE_NAME" ]; then
            echo "::error::Profile name mismatch: expected '$PROVISIONING_PROFILE_NAME' got '$PROFILE_NAME'"
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          cp "$PROFILE_PATH" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key><string>export</string>
            <key>method</key><string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict><key>$BUNDLE_ID</key><string>$PROVISIONING_PROFILE_NAME</string></dict>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF

      - name: Build archive (workspace, not project)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
          mkdir -p "$EXPORT_PATH"

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            clean

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            OTHER_CODE_SIGN_FLAGS="--keychain $CI_KEYCHAIN_PATH" \
            | tee "$RUNNER_TEMP/xcodebuild-archive.log"

          test -d "$ARCHIVE_PATH"

      - name: Export IPA
        run: |
          set -euxo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"
          shopt -s nullglob
          ipas=("$EXPORT_PATH"/*.ipa)
          if [ ${#ipas[@]} -eq 0 ]; then echo "No IPA produced"; exit 1; fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ApolloReborn-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error

      - name: Show build output on failure
        if: failure()
        run: |
          set +e
          ls -R ios/App/build || true
          cat "$RUNNER_TEMP/xcodebuild-archive.log" 2>/dev/null | tail -60 || true
          cat "$RUNNER_TEMP/xcodebuild-export.log" 2>/dev/null | tail -60 || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-build-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
            ${{ env.EXPORT_OPTIONS_PLIST }}
          if-no-files-found: warn
