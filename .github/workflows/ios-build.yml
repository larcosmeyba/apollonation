name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build signed iOS IPA
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUNDLE_ID: com.apollonation.app
      IOS_SCHEME: App
      IOS_PROJECT_DIR: ios/App
      IOS_PROJECT: ios/App/App.xcodeproj
      IOS_SPM_PACKAGE: ios/App/CapApp-SPM/Package.swift
      ARCHIVE_PATH: ios/App/build/App.xcarchive
      EXPORT_PATH: ios/App/build/export
      EXPORT_OPTIONS_PLIST: ios/App/ExportOptions.plist
      PROVISIONING_PROFILE_NAME: Apollo Nation App Store
      EXPECTED_TEAM_ID: 4APZGH6X99

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Show runner diagnostics
        run: |
          set -euxo pipefail
          sw_vers
          xcode-select -p
          xcodebuild -version

      - name: Validate required GitHub secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_PROVISIONING_PROFILE APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done
          if [ "$APPLE_TEAM_ID" != "$EXPECTED_TEAM_ID" ]; then
            echo "APPLE_TEAM_ID does not match expected $EXPECTED_TEAM_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Ensure Capacitor CLI exists
        run: |
          set -euxo pipefail
          if [ ! -x ./node_modules/.bin/cap ]; then
            npm install --no-save @capacitor/cli @capacitor/core @capacitor/ios @capacitor/android
          fi
          ./node_modules/.bin/cap --version

      - name: Build web app
        run: npm run build

      - name: Ensure iOS platform exists
        run: |
          set -euxo pipefail
          if [ -d "$IOS_PROJECT" ] && [ -f "$IOS_SPM_PACKAGE" ] && [ ! -f "$IOS_PROJECT_DIR/Podfile" ]; then
            echo "iOS SPM platform already exists"
          else
            echo "Regenerating iOS platform as a Capacitor SPM project"
            rm -rf ios
            ./node_modules/.bin/cap add ios --packagemanager SPM
          fi

      - name: Sync Capacitor iOS
        run: |
          set -euxo pipefail
          ./node_modules/.bin/cap sync ios
          ls -la "$IOS_PROJECT_DIR"
          test -d "$IOS_PROJECT"
          test -f "$IOS_SPM_PACKAGE"
          test ! -f "$IOS_PROJECT_DIR/Podfile"

      - name: Resolve Swift Package Manager dependencies
        run: |
          set -euxo pipefail
          xcodebuild -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -resolvePackageDependencies

      - name: Install signing assets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euxo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="temp123"

          # Robust decode via Python: strips ALL non-base64 chars, also handles
          # PEM-wrapped input (-----BEGIN...-----) and URL-safe base64. macOS
          # `base64 --decode` is strict and fails with "(null): error decoding
          # base64 input stream" if even one stray character is present.
          decode_secret() {
            local var_name="$1"
            local out_path="$2"
            local label="$3"
            python3 - "$var_name" "$out_path" "$label" <<'PY'
          import base64, os, re, sys
          var_name, out_path, label = sys.argv[1], sys.argv[2], sys.argv[3]
          raw = os.environ.get(var_name, "")
          if not raw:
              print(f"::error::{label} secret ({var_name}) is empty.", file=sys.stderr)
              sys.exit(1)
          # Strip PEM armor if present
          stripped = re.sub(r"-----[A-Z ]+-----", "", raw)
          # Keep only base64 alphabet (standard + url-safe) and padding
          cleaned = re.sub(r"[^A-Za-z0-9+/=_-]", "", stripped)
          # Normalize url-safe -> standard
          cleaned = cleaned.replace("-", "+").replace("_", "/")
          # Pad to multiple of 4
          pad = (-len(cleaned)) % 4
          cleaned += "=" * pad
          try:
              data = base64.b64decode(cleaned, validate=False)
          except Exception as e:
              print(f"::error::{label}: base64 decode failed: {e}. "
                    f"Raw length={len(raw)}, cleaned length={len(cleaned)}. "
                    f"Re-upload using: base64 -i your-file.p12 | pbcopy", file=sys.stderr)
              sys.exit(1)
          if len(data) < 100:
              print(f"::error::{label} decoded to only {len(data)} bytes. "
                    f"Expected a real .p12/.mobileprovision file. "
                    f"Make sure the secret is the BASE64 of the file, not the raw binary or a path.", file=sys.stderr)
              sys.exit(1)
          with open(out_path, "wb") as f:
              f.write(data)
          print(f"{label}: decoded {len(data)} bytes -> {out_path}")
          PY
          }

          decode_secret APPLE_CERTIFICATE "$CERT_PATH" "APPLE_CERTIFICATE"
          decode_secret APPLE_PROVISIONING_PROFILE "$PROFILE_PATH" "APPLE_PROVISIONING_PROFILE"

          # Sanity: .p12 starts with 0x30 (DER SEQUENCE); .mobileprovision is CMS/DER also starting with 0x30
          file "$CERT_PATH" || true
          file "$PROFILE_PATH" || true

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_APPID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")

          echo "Profile UUID:   $PROFILE_UUID"
          echo "Profile name:   $PROFILE_NAME"
          echo "Profile app-id: $PROFILE_APPID"
          echo "Profile team:   $PROFILE_TEAM"

          EXPECTED_APPID="${PROFILE_TEAM}.${BUNDLE_ID}"
          if [ "$PROFILE_APPID" != "$EXPECTED_APPID" ]; then
            echo "::error::Provisioning profile is for '$PROFILE_APPID' but the app bundle ID is '$EXPECTED_APPID'. Regenerate the profile in App Store Connect for bundle id $BUNDLE_ID and re-upload as APPLE_PROVISIONING_PROFILE."
            exit 1
          fi
          if [ "$PROFILE_NAME" != "$PROVISIONING_PROFILE_NAME" ]; then
            echo "::error::Profile name mismatch: expected '$PROVISIONING_PROFILE_NAME' got '$PROFILE_NAME'"
            exit 1
          fi

          OLD_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          NEW_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$OLD_DIR" "$NEW_DIR"
          cp "$PROFILE_PATH" "$OLD_DIR/$PROFILE_UUID.mobileprovision"
          cp "$PROFILE_PATH" "$NEW_DIR/$PROFILE_UUID.mobileprovision"

          ls -la "$OLD_DIR" "$NEW_DIR"

          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "INSTALLED_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
          mkdir -p "$EXPORT_PATH"

          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            clean

          # IMPORTANT: do NOT pass CODE_SIGN_STYLE / PROVISIONING_PROFILE_SPECIFIER /
          # PRODUCT_BUNDLE_IDENTIFIER / CODE_SIGN_IDENTITY on the CLI here. Those args
          # apply to ALL targets (including SPM resource bundles like RevenueCat_RevenueCat
          # which fail with "does not support provisioning profiles"). Signing for the
          # App target is configured in project.pbxproj and only those settings apply.
          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $CI_KEYCHAIN_PATH" \
            | tee "$RUNNER_TEMP/xcodebuild-archive.log"

          test -d "$ARCHIVE_PATH"

      - name: Export IPA
        run: |
          set -euxo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"

          shopt -s nullglob
          ipas=("$EXPORT_PATH"/*.ipa)
          if [ ${#ipas[@]} -eq 0 ]; then
            echo "No IPA file produced"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ApolloReborn-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error

      - name: Show build output on failure
        if: failure()
        run: |
          set +e
          ls -R ios/App/build || true
          cat "$RUNNER_TEMP/xcodebuild-archive.log" 2>/dev/null | tail -50 || true
          cat "$RUNNER_TEMP/xcodebuild-export.log" 2>/dev/null | tail -50 || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-build-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
            ${{ env.EXPORT_OPTIONS_PLIST }}
          if-no-files-found: warn
