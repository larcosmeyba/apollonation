name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android:
    name: Build signed Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUNDLE_ID: com.apollonation.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Ensure Capacitor packages exist
        run: |
          set -euxo pipefail
          if [ ! -x ./node_modules/.bin/cap ]; then
            npm install --no-save @capacitor/cli @capacitor/core @capacitor/ios @capacitor/android
          fi

      - name: Build web app
        run: npm run build

      - name: Ensure Android platform exists
        run: |
          set -euxo pipefail
          if [ ! -d android ]; then
            ./node_modules/.bin/cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Generate Apollo app icons (Android)
        run: |
          set -euxo pipefail
          if [ ! -f resources/icon.png ]; then
            echo "::error::resources/icon.png missing — Apollo app icon source not found."
            exit 1
          fi
          npm install --no-save @capacitor/assets
          npx @capacitor/assets generate \
            --android \
            --iconBackgroundColor '#000000' \
            --iconBackgroundColorDark '#000000'

      - name: Sync Capacitor Android
        run: |
          set -euxo pipefail
          ./node_modules/.bin/cap sync android

      - name: Configure Gradle wrapper and properties
        run: |
          set -euxo pipefail
          cd android

          # Fix gradle.properties
          {
            echo "org.gradle.java.home=$JAVA_HOME"
            echo "kotlin.jvm.target=21"
            echo "android.useAndroidX=true"
          } >> gradle.properties

          # Update Gradle wrapper to 8.7
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' gradle/wrapper/gradle-wrapper.properties


          echo "=== gradle.properties ==="
          cat gradle.properties

          echo "=== Gradle wrapper version ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${ANDROID_KEYSTORE:-}" ] && MISSING="$MISSING ANDROID_KEYSTORE"
          [ -z "${ANDROID_KEY_ALIAS:-}" ] && MISSING="$MISSING ANDROID_KEY_ALIAS"
          [ -z "${ANDROID_KEY_PASSWORD:-}" ] && MISSING="$MISSING ANDROID_KEY_PASSWORD"
          [ -z "${ANDROID_STORE_PASSWORD:-}" ] && MISSING="$MISSING ANDROID_STORE_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GitHub secrets:$MISSING"
            exit 1
          fi
          echo "All signing secrets are set"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          set -euo pipefail
          echo -n "$ANDROID_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::warning::GOOGLE_SERVICES_JSON_BASE64 secret is not set. Building WITHOUT FCM — Android push notifications will NOT work in this build. Add the secret in GitHub → Settings → Secrets → Actions to enable push."
            exit 0
          fi
          echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          if [ ! -s android/app/google-services.json ]; then
            echo "::error::Decoded google-services.json is empty. Re-encode the file with: base64 -i google-services.json | tr -d '\\n'"
            exit 1
          fi
          # Sanity check it's JSON containing the expected package name.
          if ! grep -q "\"package_name\"" android/app/google-services.json; then
            echo "::error::Decoded google-services.json does not look valid (no package_name field)."
            exit 1
          fi
          echo "google-services.json decoded successfully ($(wc -c < android/app/google-services.json) bytes)"

      - name: Build signed AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euxo pipefail
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/upload-keystore.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Verify AAB exists
        run: |
          set -euo pipefail
          AAB=$(find android/app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "No AAB file produced"
            exit 1
          fi
          echo "AAB built: $AAB"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: ApolloReborn-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Show build output on failure
        if: failure()
        run: |
          set +e
          ls -R android/app/build/outputs || true
